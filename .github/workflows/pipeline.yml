name: AI DevSecOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # 🔥 FIX FOR CODEQL

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4   # updated

      - name: Setup Python
        uses: actions/setup-python@v5   # updated
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # 🔐 FIXED CODEQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Analyze Code
        uses: github/codeql-action/analyze@v4

      - name: Run App Test
        run: |
          python app/app.py &
          sleep 5
          curl http://localhost:5000

      - name: AI Step
        run: echo "AI will be added here"

      - name: Build Docker
        run: docker build -t ai-devsecops .

      - name: Done
        run: echo "Pipeline Completed 🚀"