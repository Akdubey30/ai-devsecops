name: AI DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create reports folder
        run: mkdir -p reports

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          output: reports/codeql-results

      - name: Save CodeQL report
        if: always()
        run: |
          if ls reports/codeql-results/*.sarif 1> /dev/null 2>&1; then
            cp reports/codeql-results/*.sarif reports/codeql_report.json
          else
            echo "[]" > reports/codeql_report.json
          fi

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: reports/trivy_report.json
          exit-code: 0

      - name: Run custom AI security engine
        if: always()
        run: |
          python3 ai/security_engine.py

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/